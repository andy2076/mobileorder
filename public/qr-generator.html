<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード生成ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; }
        h1 { font-size: 20px; margin-bottom: 20px; color: #333; }
        .card { background: #fff; border-radius: 12px; padding: 24px; max-width: 600px; margin: 0 auto 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 14px; }
        .btn { background: #4CAF50; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-print { background: #2196F3; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; margin-top: 12px; }
        .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-top: 20px; }
        .qr-item { background: #fff; border-radius: 10px; padding: 16px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        .qr-item h3 { font-size: 14px; color: #333; margin-top: 12px; }
        .qr-item p { font-size: 12px; color: #999; }
        @media print {
            .no-print { display: none; }
            .qr-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="card no-print">
        <h1>🪑 テーブルQRコード生成</h1>
        <label>店舗URL（例: https://machiorder.com/s/default）</label>
        <input type="text" id="base-url" placeholder="https://machiorder.com/s/default">
        <label>テーブル数</label>
        <input type="number" id="table-count" value="10" min="1" max="99">
        <button class="btn" onclick="generateQR()">QRコードを生成</button>
    </div>

    <div id="qr-result"></div>

    <script>
        function generateQR() {
            const baseUrl = document.getElementById('base-url').value.trim().replace(/\/$/, '');
            const count   = parseInt(document.getElementById('table-count').value);

            if (!baseUrl) { alert('URLを入力してください'); return; }
            if (!count || count < 1) { alert('テーブル数を入力してください'); return; }

            const result = document.getElementById('qr-result');
            result.innerHTML = `
                <div class="card no-print" style="text-align:center">
                    <button class="btn-print" onclick="window.print()">🖨️ 印刷する</button>
                </div>
                <div class="qr-grid" id="qr-grid"></div>
            `;

            const grid = document.getElementById('qr-grid');

            for (let i = 1; i <= count; i++) {
                const url = `${baseUrl}/?table=${i}`;
                const div = document.createElement('div');
                div.className = 'qr-item';
                div.innerHTML = `<div id="qr-${i}"></div><h3>テーブル ${i}</h3><p style="word-break:break-all;font-size:10px">${url}</p>`;
                grid.appendChild(div);

                setTimeout(() => {
                    new QRCode(document.getElementById(`qr-${i}`), {
                        text: url,
                        width: 128,
                        height: 128,
                        correctLevel: QRCode.CorrectLevel.M
                    });
                }, i * 50);
            }
        }
    </script>
</body>
</html>
